<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6d5cff">
<title>AgiS — カードスキャン</title>
<style>
  :root{ --ink:#161a2b; --sub:#6b7186; --line:#e7e9f4; --card:#fff;
    --brand1:#6d5cff; --brand2:#a855f7; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --shadow:0 10px 30px rgba(60,50,120,.12); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{ font-family:'Segoe UI','Hiragino Kaku Gothic ProN','Meiryo',sans-serif; color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%, #efeaff 0%, #f6f7fc 40%, #f6f7fc 100%); min-height:100vh; }
  .app{ max-width:520px; margin:0 auto; padding:16px 16px 40px; }
  .top{ display:flex; align-items:center; gap:10px; padding:6px 2px 14px; }
  .logo{ width:38px; height:38px; border-radius:12px; background:linear-gradient(135deg,var(--brand1),var(--brand2));
    display:grid; place-items:center; color:#fff; font-size:20px; box-shadow:var(--shadow); }
  .brand{ font-weight:800; font-size:18px; } .brand small{ display:block; font-weight:600; font-size:11px; color:var(--sub); letter-spacing:.5px; }
  .stage{ position:relative; width:100%; aspect-ratio:3/4; border-radius:22px; overflow:hidden; background:#0c0e18; box-shadow:var(--shadow); }
  video,canvas{ position:absolute; inset:0; width:100%; height:100%; }
  video{ object-fit:cover; }
  canvas{ object-fit:contain; touch-action:none; }
  .frame{ position:absolute; inset:7%; pointer-events:none; }
  .frame i{ position:absolute; width:28px; height:28px; border:3px solid #fff; opacity:.92; }
  .frame .tl{ top:0; left:0; border-right:0; border-bottom:0; border-radius:8px 0 0 0; }
  .frame .tr{ top:0; right:0; border-left:0; border-bottom:0; border-radius:0 8px 0 0; }
  .frame .bl{ bottom:0; left:0; border-right:0; border-top:0; border-radius:0 0 0 8px; }
  .frame .br{ bottom:0; right:0; border-left:0; border-top:0; border-radius:0 0 8px 0; }
  /* 水平器（回転ロール基準の＋クロスヘア） */
  .lvl{ position:absolute; inset:0; pointer-events:none; }
  .lvl .cg{ position:absolute; left:50%; top:50%; width:66%; height:66%; transform:translate(-50%,-50%) rotate(0deg); transition:transform .05s linear; }
  .lvl .cg .h{ position:absolute; left:0; right:0; top:50%; height:2px; background:rgba(255,255,255,.6); transform:translateY(-50%); box-shadow:0 0 2px rgba(0,0,0,.4); }
  .lvl .cg .v{ position:absolute; top:0; bottom:0; left:50%; width:2px; background:rgba(255,255,255,.6); transform:translateX(-50%); box-shadow:0 0 2px rgba(0,0,0,.4); }
  .lvl .cg .dot{ position:absolute; left:50%; top:50%; width:12px; height:12px; margin:-6px 0 0 -6px; border:2px solid rgba(255,255,255,.7); border-radius:50%; }
  .lvl.level .cg .h,.lvl.level .cg .v{ background:var(--good); box-shadow:0 0 6px rgba(34,197,94,.8); }
  .lvl.level .cg .dot{ border-color:var(--good); box-shadow:0 0 6px rgba(34,197,94,.7); }
  .live{ position:absolute; left:0; right:0; bottom:10px; text-align:center; color:#fff; font-size:12px; font-weight:700; text-shadow:0 1px 5px rgba(0,0,0,.7); }
  .shutter{ display:grid; place-items:center; margin:16px 0 6px; }
  .shutter button{ width:74px; height:74px; border-radius:50%; border:0; background:linear-gradient(135deg,var(--brand1),var(--brand2)); box-shadow:var(--shadow); position:relative; }
  .shutter button::after{ content:""; position:absolute; inset:6px; border-radius:50%; border:3px solid rgba(255,255,255,.9); }
  .shutter button:active{ transform:scale(.94); }
  .mini{ display:flex; gap:8px; justify-content:center; margin-top:8px; }
  .mini button{ padding:9px 16px; border-radius:999px; border:1px solid var(--line); background:#fff; color:var(--ink); font-weight:600; font-size:13px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-top:14px; box-shadow:var(--shadow); }
  .card h3{ margin:0 0 10px; font-size:13px; color:var(--sub); font-weight:700; letter-spacing:.4px; text-transform:uppercase; }
  .psaBadge{ display:inline-block; font-size:26px; font-weight:800; padding:2px 16px; border-radius:14px; color:#fff; }
  .srcTag{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; margin-left:8px; vertical-align:middle; }
  .barwrap{ margin:10px 0; } .barlabel{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:6px; }
  .bar{ position:relative; height:12px; border-radius:999px; background:#eef0f8; overflow:hidden; }
  .bar .fill{ position:absolute; inset:0 auto 0 0; border-radius:999px; width:50%; }
  .bar .c1{ position:absolute; top:-3px; bottom:-3px; left:45%; width:2px; background:rgba(0,0,0,.2); }
  .bar .c2{ position:absolute; top:-3px; bottom:-3px; left:55%; width:2px; background:rgba(0,0,0,.2); }
  .verdict{ font-size:12px; color:var(--sub); margin-top:6px; }
  label{ display:block; color:var(--sub); font-size:12px; font-weight:600; margin-bottom:6px; }
  input{ width:100%; padding:13px 14px; border-radius:14px; border:1px solid var(--line); background:#fbfbff; color:var(--ink); font-size:16px; }
  input:focus{ outline:0; border-color:var(--brand1); box-shadow:0 0 0 3px rgba(109,92,255,.15); }
  .cardname{ font-size:16px; font-weight:800; margin-top:12px; }
  .prices{ display:flex; gap:10px; margin-top:10px; }
  .pill{ flex:1; border-radius:16px; padding:12px; text-align:center; }
  .pill.psa{ background:linear-gradient(135deg,rgba(109,92,255,.12),rgba(168,85,247,.12)); border:1px solid rgba(109,92,255,.25); }
  .pill.raw{ background:#f4f6fb; border:1px solid var(--line); }
  .pill .k{ font-size:11px; color:var(--sub); font-weight:700; } .pill .v{ font-size:20px; font-weight:800; margin-top:2px; } .pill.psa .v{ color:var(--brand1); }
  .src{ font-size:11px; color:var(--sub); margin-top:10px; } .empty{ color:var(--sub); font-size:13px; margin-top:12px; }
  .chip{ display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; }
  .cand{ display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line); border-radius:14px; margin-top:8px; background:#fbfbff; }
  .cand:active{ background:#f1eefe; }
  .cand .nm{ flex:1; min-width:0; } .cand .nm b{ display:block; font-size:14px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cand .nm span{ font-size:11px; color:var(--sub); } .cand .pr{ text-align:right; font-size:12px; font-weight:700; white-space:nowrap; }
  .cand .pr .p10{ color:var(--brand1); } .cand .pr .rw{ color:var(--sub); font-weight:600; }
  .back{ font-size:12px; color:var(--brand1); font-weight:700; margin-bottom:6px; display:inline-block; }
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="logo">🎴</div><div class="brand">AgiS <small>CARD SCAN</small></div></div>

  <div class="stage" id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas" hidden></canvas>
    <div class="frame"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="lvl" id="lvl"><div class="cg" id="crossG"><div class="h"></div><div class="v"></div><div class="dot"></div></div></div>
    <div class="live" id="live">水平を合わせて撮影</div>
  </div>

  <div class="shutter"><button id="shot" aria-label="撮影"></button></div>
  <div class="mini"><button id="retry" hidden>↺ 撮り直す</button></div>

  <div class="card" id="centerBox" hidden>
    <h3>センタリング / PSA推定</h3>
    <div id="centerHint" class="empty">解析中…</div>
    <div id="centerViz" hidden>
      <div style="margin-bottom:10px"><span class="psaBadge" id="psaBadge">–</span><span class="srcTag" id="srcTag"></span></div>
      <div class="barwrap"><div class="barlabel"><span>左右</span><span id="lrText">–</span></div>
        <div class="bar"><div class="fill" id="lrFill"></div><div class="c1"></div><div class="c2"></div></div></div>
      <div class="barwrap"><div class="barlabel"><span>上下</span><span id="tbText">–</span></div>
        <div class="bar"><div class="fill" id="tbFill"></div><div class="c1"></div><div class="c2"></div></div></div>
      <div class="verdict" id="verdict"></div>
      <div class="mini" style="margin-top:12px"><button id="redetect">↻ 自動再検出</button></div>
    </div>
  </div>

  <div class="card">
    <h3>相場</h3>
    <label>カード名で検索（例: メガリザードン ／ レシラム）</label>
    <input id="ptype" placeholder="カード名を入力（撮影すると型式も自動読取）">
    <div id="priceOut" class="empty">カード名を入れると候補が出る</div>
  </div>
</div>

<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var video=$('video'),canvas=$('canvas'),lvl=$('lvl'),crossG=$('crossG'),live=$('live');
  var shot=$('shot'),retry=$('retry'),centerBox=$('centerBox'),centerHint=$('centerHint'),centerViz=$('centerViz');
  var lrFill=$('lrFill'),tbFill=$('tbFill'),lrText=$('lrText'),tbText=$('tbText'),verdict=$('verdict'),psaBadge=$('psaBadge'),srcTag=$('srcTag');
  var ptype=$('ptype'),priceOut=$('priceOut'),redetect=$('redetect');
  var PRICES={};

  fetch('prices.json?'+Date.now()).then(function(r){return r.json();}).then(function(d){PRICES=d.cards||{};}).catch(function(){});

  /* ---------- カメラ ---------- */
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1440}},audio:false})
    .then(function(stream){
      video.srcObject=stream; video.play();
      var track=stream.getVideoTracks()[0];
      try{ var caps=track.getCapabilities?track.getCapabilities():{}; var adv=[];
        if(caps.focusMode && caps.focusMode.indexOf('continuous')>=0) adv.push({focusMode:'continuous'});
        if(adv.length) track.applyConstraints({advanced:adv}); }catch(e){}
    }).catch(function(){ live.textContent='カメラ不可（型式→相場は使えます）'; });

  /* ---------- 水平器（回転ロール基準。立てても寝かせても効く） ----------
     deviceorientation の gamma（左右回転）を第一。無ければ devicemotion の重力から算出。 */
  var gotSensor=false, sensorOn=false;
  function applyRoll(roll){
    gotSensor=true;
    crossG.style.transform='translate(-50%,-50%) rotate('+(-roll)+'deg)';
    if(Math.abs(roll)<4){ lvl.classList.add('level'); live.textContent='水平OK ✓ 撮影して測定'; }
    else { lvl.classList.remove('level'); live.textContent=(roll>0?'右':'左')+'に '+Math.round(Math.abs(roll))+'° 傾き → まっすぐに'; }
  }
  function onOri(e){ if(e.gamma==null) return; applyRoll(e.gamma); }
  function onMotion(e){
    var a=e.accelerationIncludingGravity||e.acceleration; if(!a||a.x==null) return;
    applyRoll(Math.atan2(a.x,Math.hypot(a.y||0,a.z||0))*180/Math.PI);
  }
  function attach(){ window.addEventListener('deviceorientation',onOri); window.addEventListener('devicemotion',onMotion); }
  function enableSensors(){
    if(sensorOn) return; sensorOn=true;
    var reqs=[];
    if(window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) reqs.push(DeviceOrientationEvent.requestPermission());
    if(window.DeviceMotionEvent && DeviceMotionEvent.requestPermission) reqs.push(DeviceMotionEvent.requestPermission());
    if(reqs.length){
      Promise.all(reqs.map(function(p){return p.catch(function(){return 'error';});})).then(function(res){
        if(res.indexOf('granted')>=0){ attach(); }
        else { sensorOn=false; live.textContent='傾き許可が必要 → 設定→Safari→「モーションとオリエンテーション」をON'; }
      });
    } else { attach(); }
    setTimeout(function(){ if(!gotSensor){ lvl.style.opacity='.35'; live.textContent='傾きセンサー未対応：目視で水平に'; sensorOn=false; } },1800);
  }
  // 最初のタッチで自動有効化（iOSの許可はジェスチャ内で要求）
  document.addEventListener('pointerdown',function once(){ enableSensors(); document.removeEventListener('pointerdown',once); });

  /* ---------- 撮影 → ドラッグ式センタリング枠 ----------
     緑=カード外枠(4辺)、水色=絵柄枠(4辺)。自動検出で初期配置→ユーザーが線をドラッグして合わせる。
     どこを枠と判定したかが見える＆黒縁SAR等の低精度を手で補正できる。 */
  var shotImg=document.createElement('canvas'), box=null, detected=false, drag=null;
  function capture(){
    var w=video.videoWidth||720,h=video.videoHeight||960;
    canvas.width=w; canvas.height=h; canvas.getContext('2d').drawImage(video,0,0,w,h);
    shotImg.width=w; shotImg.height=h; shotImg.getContext('2d').drawImage(canvas,0,0);
    video.hidden=true; canvas.hidden=false; lvl.style.display='none'; live.style.display='none';
    shot.parentElement.style.display='none'; retry.hidden=false;
    centerBox.hidden=false; centerViz.hidden=false; centerHint.hidden=false;
    centerHint.textContent='解析中…';
    setTimeout(function(){ autoCenter(); },30);
    setTimeout(runOCR,80);
  }
  function resetShot(){
    video.hidden=false; canvas.hidden=true; lvl.style.display=''; lvl.style.opacity=''; live.style.display='';
    shot.parentElement.style.display=''; retry.hidden=true; centerBox.hidden=true; box=null; drag=null;
  }

  /* 勾配プロジェクションで初期枠を推定。失敗しても既定枠を置いて必ずドラッグ可能に。 */
  function autoCenter(){
    var W=canvas.width,H=canvas.height;
    detected=false;
    try{
      var sw=420, sh=Math.round(H*sw/W);
      var t=document.createElement('canvas'); t.width=sw; t.height=sh;
      t.getContext('2d').drawImage(canvas,0,0,sw,sh);
      var d=t.getContext('2d').getImageData(0,0,sw,sh).data;
      function L(x,y){ var i=(y*sw+x)*4; return d[i]*.30+d[i+1]*.59+d[i+2]*.11; }
      var colE=new Float32Array(sw), rowE=new Float32Array(sh);
      var y0=(sh*0.20)|0,y1=(sh*0.80)|0, x0=(sw*0.20)|0,x1=(sw*0.80)|0,x,y,s;
      for(x=1;x<sw-1;x++){ s=0; for(y=y0;y<y1;y++) s+=Math.abs(L(x+1,y)-L(x-1,y)); colE[x]=s/(y1-y0); }
      for(y=1;y<sh-1;y++){ s=0; for(x=x0;x<x1;x++) s+=Math.abs(L(x,y+1)-L(x,y-1)); rowE[y]=s/(x1-x0); }
      function smooth(p){ var q=new Float32Array(p.length),i; for(i=2;i<p.length-2;i++) q[i]=(p[i-2]+p[i-1]*2+p[i]*3+p[i+1]*2+p[i+2])/9; return q; }
      colE=smooth(colE); rowE=smooth(rowE);
      function peaks(p){ var mx=0,n=p.length,i; for(i=0;i<n;i++) if(p[i]>mx)mx=p[i]; if(mx<6) return [];
        var th=mx*0.28, cand=[]; for(i=3;i<n-3;i++){ if(p[i]>=th && p[i]>=p[i-1]&&p[i]>=p[i+1]&&p[i]>=p[i-2]&&p[i]>=p[i+2]) cand.push([i,p[i]]); }
        cand.sort(function(a,b){return b[1]-a[1];});
        var pick=[],k,m,ok; for(k=0;k<cand.length;k++){ ok=true; for(m=0;m<pick.length;m++) if(Math.abs(cand[k][0]-pick[m])<12){ok=false;break;} if(ok)pick.push(cand[k][0]); }
        pick.sort(function(a,b){return a-b;}); return pick; }
      var px=peaks(colE), py=peaks(rowE), sx=W/sw, sy=H/sh;
      if(px.length>=4 && py.length>=4){
        var oL=px[0]*sx,iL=px[1]*sx,iR=px[px.length-2]*sx,oR=px[px.length-1]*sx;
        var oT=py[0]*sy,iT=py[1]*sy,iB=py[py.length-2]*sy,oB=py[py.length-1]*sy;
        if((oR-oL)>W*0.5 && (oB-oT)>H*0.5 && (iL-oL)>2 && (oR-iR)>2 && (iT-oT)>2 && (oB-iB)>2){
          box={oL:oL,iL:iL,iR:iR,oR:oR,oT:oT,iT:iT,iB:iB,oB:oB}; detected=true;
        }
      }
    }catch(e){}
    if(!box || !detected){ // 既定枠（画面比で仮置き）
      box={oL:W*0.05,iL:W*0.14,iR:W*0.86,oR:W*0.95, oT:H*0.04,iT:H*0.11,iB:H*0.89,oB:H*0.96};
    }
    centerHint.textContent=(detected?'自動検出した枠を表示。':'自動不可→仮枠を表示。')+' 緑=カード縁 / 水色=絵柄枠。線をドラッグして合わせて（黒縁SARは特に要調整）';
    redraw(); updateCenter();
  }

  /* 画像は object-fit:contain 表示。client座標→canvas画素へ（レターボックス補正） */
  function toCanvas(cx,cy){
    var r=canvas.getBoundingClientRect(), W=canvas.width,H=canvas.height;
    var sc=Math.min(r.width/W, r.height/H), dw=W*sc, dh=H*sc, ox=(r.width-dw)/2, oy=(r.height-dh)/2;
    return { x:(cx-r.left-ox)/sc, y:(cy-r.top-oy)/sc, sc:sc };
  }
  function redraw(){
    var ctx=canvas.getContext('2d'), W=canvas.width,H=canvas.height;
    ctx.drawImage(shotImg,0,0);
    var oL=box.oL,iL=box.iL,iR=box.iR,oR=box.oR,oT=box.oT,iT=box.iT,iB=box.iB,oB=box.oB;
    var lw=Math.max(2,W*0.006), hr=Math.max(11,W*0.028), fs=Math.max(20,W*0.05);
    var Lb=Math.max(1,iL-oL),Rb=Math.max(1,oR-iR),Tb=Math.max(1,iT-oT),Bb=Math.max(1,oB-iB);
    var lr=Math.round(Lb/(Lb+Rb)*100), tb=Math.round(Tb/(Tb+Bb)*100);
    function tint(p){ var o=Math.abs(p-50); return o<=5?'rgba(34,197,94,.30)':(o<=10?'rgba(245,158,11,.32)':'rgba(239,68,68,.34)'); }
    // 実測してる余白帯を塗る（左右＝縦の絵柄範囲、上下＝横の絵柄範囲）
    ctx.fillStyle=tint(lr);          ctx.fillRect(oL,iT,iL-oL,iB-iT); ctx.fillRect(iR,iT,oR-iR,iB-iT);
    ctx.fillStyle=tint(tb);          ctx.fillRect(iL,oT,iR-iL,iT-oT); ctx.fillRect(iL,iB,iR-iL,oB-iB);
    // 外枠（緑・カード縁）と絵柄枠（水色・破線）を"四角"で
    ctx.lineWidth=lw; ctx.setLineDash([]); ctx.strokeStyle='#22c55e'; ctx.strokeRect(oL,oT,oR-oL,oB-oT);
    ctx.setLineDash([lw*3,lw*2]); ctx.strokeStyle='#38bdf8'; ctx.strokeRect(iL,iT,iR-iL,iB-iT); ctx.setLineDash([]);
    // ハンドル（各辺の中央●）
    ctx.fillStyle='#22c55e';
    ctx.beginPath(); ctx.arc(oL,(oT+oB)/2,hr,0,7); ctx.arc(oR,(oT+oB)/2,hr,0,7); ctx.arc((oL+oR)/2,oT,hr,0,7); ctx.arc((oL+oR)/2,oB,hr,0,7); ctx.fill();
    ctx.fillStyle='#38bdf8';
    ctx.beginPath(); ctx.arc(iL,(iT+iB)/2,hr,0,7); ctx.arc(iR,(iT+iB)/2,hr,0,7); ctx.arc((iL+iR)/2,iT,hr,0,7); ctx.arc((iL+iR)/2,iB,hr,0,7); ctx.fill();
    // 各辺の比率を画像に直接ラベル
    ctx.font='800 '+fs+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    function lab(x,y,t){ ctx.lineWidth=fs*0.22; ctx.strokeStyle='rgba(0,0,0,.75)'; ctx.strokeText(t,x,y); ctx.fillStyle='#fff'; ctx.fillText(t,x,y); }
    var cy=(iT+iB)/2, cx=(iL+iR)/2;
    lab((oL+iL)/2, cy, lr+'%'); lab((iR+oR)/2, cy, (100-lr)+'%');
    lab(cx, (oT+iT)/2, tb+'%'); lab(cx, (iB+oB)/2, (100-tb)+'%');
  }
  function nearestHandle(p){
    var W=canvas.width,H=canvas.height, th=Math.max(W*0.06,26), best=null,bd=th;
    var vs=['oL','iL','iR','oR'], hs=['oT','iT','iB','oB'],i,dd;
    for(i=0;i<vs.length;i++){ dd=Math.abs(p.x-box[vs[i]]); if(dd<bd){bd=dd;best={k:vs[i],ax:'x'};} }
    for(i=0;i<hs.length;i++){ dd=Math.abs(p.y-box[hs[i]]); if(dd<bd){bd=dd;best={k:hs[i],ax:'y'};} }
    return best;
  }
  canvas.addEventListener('pointerdown',function(ev){
    if(canvas.hidden||!box) return;
    var p=toCanvas(ev.clientX,ev.clientY), h=nearestHandle(p);
    if(h){ ev.preventDefault(); drag=h; canvas.setPointerCapture&&canvas.setPointerCapture(ev.pointerId); }
  });
  canvas.addEventListener('pointermove',function(ev){
    if(!drag||canvas.hidden) return;
    ev.preventDefault();
    var p=toCanvas(ev.clientX,ev.clientY), W=canvas.width,H=canvas.height, m=6;
    if(drag.ax==='x'){ var v=Math.max(0,Math.min(W,p.x));
      if(drag.k==='oL') v=Math.min(v,box.iL-m); else if(drag.k==='iL') v=Math.max(box.oL+m,Math.min(v,box.iR-m));
      else if(drag.k==='iR') v=Math.max(box.iL+m,Math.min(v,box.oR-m)); else v=Math.max(v,box.iR+m);
      box[drag.k]=v;
    } else { var w=Math.max(0,Math.min(H,p.y));
      if(drag.k==='oT') w=Math.min(w,box.iT-m); else if(drag.k==='iT') w=Math.max(box.oT+m,Math.min(w,box.iB-m));
      else if(drag.k==='iB') w=Math.max(box.iT+m,Math.min(w,box.oB-m)); else w=Math.max(w,box.iB+m);
      box[drag.k]=w;
    }
    redraw(); updateCenter();
  });
  function endDrag(){ drag=null; }
  canvas.addEventListener('pointerup',endDrag); canvas.addEventListener('pointercancel',endDrag);

  function qcolor(p){ var o=Math.abs(p-50); return o<=5?'var(--good)':(o<=10?'var(--warn)':'var(--bad)'); }
  function psaEst(lr,tb){
    var worst=Math.max(Math.abs(lr-50),Math.abs(tb-50)); // 5 = 55:45
    if(worst<=5) return {g:'10',c:'var(--good)',n:'センタリングはPSA10圏（両軸55:45以内）'};
    if(worst<=10) return {g:'9',c:'var(--warn)',n:'PSA10は不可（60:40圏）'};
    if(worst<=15) return {g:'8',c:'var(--bad)',n:'ズレ大（65:35圏）'};
    return {g:'≤7',c:'var(--bad)',n:'センタリング大きくズレ'};
  }
  function updateCenter(){
    if(!box) return;
    var Lb=Math.max(1,box.iL-box.oL), Rb=Math.max(1,box.oR-box.iR), Tb=Math.max(1,box.iT-box.oT), Bb=Math.max(1,box.oB-box.iB);
    var lr=Math.round(Lb/(Lb+Rb)*100), tb=Math.round(Tb/(Tb+Bb)*100);
    lrText.textContent=lr+' : '+(100-lr); tbText.textContent=tb+' : '+(100-tb);
    lrFill.style.width=lr+'%'; lrFill.style.background=qcolor(lr);
    tbFill.style.width=tb+'%'; tbFill.style.background=qcolor(tb);
    var e=psaEst(lr,tb);
    psaBadge.textContent='PSA '+e.g; psaBadge.style.background=e.c;
    if(detected){ srcTag.textContent='自動検出（要確認）'; srcTag.style.background='#fff4e5'; srcTag.style.color='#b45309'; }
    else { srcTag.textContent='手動で線合わせ'; srcTag.style.background='#eaf7ee'; srcTag.style.color='#15803d'; }
    verdict.textContent=e.n+'　※角・エッジ・傷は別途。最終は自分の目で';
  }

  /* ---------- 相場（カード名 or 型式で検索 → 候補選択） ---------- */
  function slug(t){ return String(t).trim().toLowerCase().replace(/[\s/]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
  function yen(v){ return (typeof v==='number')?'¥'+v.toLocaleString():'—'; }
  function norm(s){ return String(s).toLowerCase().replace(/[\s・=&＆]/g,''); }
  function codeOf(k){ var p=k.split('-');
    if(p.length>=2 && /^\d+$/.test(p[p.length-1]) && /^[0-9a-z]+$/.test(p[p.length-2]))
      return (p.slice(0,-2).join(' ')+' '+p[p.length-2]+'/'+p[p.length-1]).toUpperCase().trim();
    return k.toUpperCase();
  }
  function search(){
    var q=ptype.value.trim();
    if(!q){ priceOut.className='empty'; priceOut.textContent='カード名を入れると候補が出る'; return; }
    var nq=norm(q), sq=slug(q), keys=Object.keys(PRICES), hit=[];
    for(var i=0;i<keys.length;i++){ var k=keys[i], c=PRICES[k];
      if(norm(c.name||'').indexOf(nq)>=0 || k.indexOf(sq)>=0) hit.push(k); }
    if(!hit.length){ priceOut.className='empty'; priceOut.innerHTML='<span class="chip" style="background:#fff0f4;color:#e11d63">未収録</span> 別名・ひらがな・型式でも試して。無ければスニダン現物で。'; return; }
    hit.sort(function(a,b){ return (PRICES[b].psa10||0)-(PRICES[a].psa10||0); });
    if(hit.length>12) hit=hit.slice(0,12);
    if(hit.length===1){ showDetail(hit[0],false); return; }
    var html='<div class="empty" style="margin:2px 0 4px">'+hit.length+'件の候補 — タップで選択（同名多数）</div>';
    for(var i=0;i<hit.length;i++){ var k=hit[i], c=PRICES[k];
      html+='<div class="cand" data-k="'+k+'"><div class="nm"><b>'+(c.name||'')+'</b><span>'+codeOf(k)+'</span></div>'+
        '<div class="pr"><div class="p10">PSA10 '+yen(c.psa10)+'</div><div class="rw">素体 '+yen(c.sotai)+'</div></div></div>'; }
    priceOut.className=''; priceOut.innerHTML=html;
    var cs=priceOut.querySelectorAll('.cand');
    for(var i=0;i<cs.length;i++) cs[i].addEventListener('click',function(){ showDetail(this.getAttribute('data-k'),true); });
  }
  function showDetail(k,back){
    var c=PRICES[k]; if(!c) return;
    priceOut.className='';
    priceOut.innerHTML=(back?'<span class="back" id="backBtn">← 候補に戻る</span>':'')+
      '<div class="cardname">'+(c.name||'')+' <span style="font-size:12px;color:var(--sub);font-weight:600">'+codeOf(k)+'</span></div>'+
      '<div class="prices">'+
      '<div class="pill psa"><div class="k">PSA10</div><div class="v">'+yen(c.psa10)+'</div></div>'+
      '<div class="pill raw"><div class="k">素体</div><div class="v">'+yen(c.sotai)+'</div></div></div>'+
      '<div class="src">出典 '+(c.src||'')+'（算定値）・最終値付けはスニダン現物で</div>';
    var b=$('backBtn'); if(b) b.addEventListener('click',search);
  }

  /* ---------- 型式OCR（Tesseract.jsを押した時だけ遅延ロード） ---------- */
  var ocrReady=null;
  function loadOCR(){
    if(ocrReady) return ocrReady;
    ocrReady=new Promise(function(res,rej){
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
      s.onload=function(){res(window.Tesseract);}; s.onerror=function(){rej();};
      document.head.appendChild(s);
    });
    return ocrReady;
  }
  function cropBottom(){ // 綺麗な撮影原本(shotImg)の下20%を拡大＋コントラスト強調
    var W=shotImg.width,H=shotImg.height, ch=Math.round(H*0.20), cy=H-ch, sc=Math.min(3,1500/W);
    var up=document.createElement('canvas'); up.width=Math.round(W*sc); up.height=Math.round(ch*sc);
    var uc=up.getContext('2d'); uc.imageSmoothingEnabled=true;
    uc.drawImage(shotImg,0,cy,W,ch,0,0,up.width,up.height);
    var im=uc.getImageData(0,0,up.width,up.height), d=im.data, i,g,mn=255,mx=0;
    for(i=0;i<d.length;i+=4){ g=d[i]*.3+d[i+1]*.59+d[i+2]*.11; d[i]=d[i+1]=d[i+2]=g; if(g<mn)mn=g; if(g>mx)mx=g; }
    var rng=Math.max(1,mx-mn);
    for(i=0;i<d.length;i+=4){ var v=(d[i]-mn)/rng*255; d[i]=d[i+1]=d[i+2]=v<0?0:(v>255?255:v); }
    uc.putImageData(im,0,0); return up;
  }
  function extractType(text){ // 採番(223/193)だけ狙う。M2a等の特殊フォントは無視
    var s=(text||'').toUpperCase().replace(/\s+/g,' ');
    var m=s.match(/(\d{1,3})\s*\/\s*([0-9SVP\-]{1,7})/);       // 223/193, 289/SV-P
    if(m) return m[1]+'/'+m[2];
    m=s.match(/(\d{2,3})\D{1,3}(\d{2,3})/);                     // スラッシュ誤読の保険
    if(m) return m[1]+'/'+m[2];
    return null;
  }
  function runOCR(){ // 撮影後に自動。採番が読めて、かつ手入力が空なら埋めて検索
    if(canvas.hidden) return;
    loadOCR().then(function(T){
      return T.recognize(cropBottom(),'eng',{tessedit_char_whitelist:'0123456789/SVP-',tessedit_pageseg_mode:'6'});
    }).then(function(r){
      var t=extractType((r&&r.data&&r.data.text)||'');
      if(t && !ptype.value.trim()){ ptype.value=t; search(); }
    }).catch(function(){});
  }

  ptype.addEventListener('input',search);
  shot.addEventListener('click',capture);
  retry.addEventListener('click',resetShot);
  redetect.addEventListener('click',function(){ if(!canvas.hidden) autoCenter(); });
})();
</script>
