<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AgiS カード検品</title>
<style>
  :root{ --bg:#0f1420; --panel:#1a2130; --line:#2a3346; --txt:#e6e9ef; --sub:#8b93a7; --accent:#4a7dff; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--txt); font-family:'Segoe UI','Meiryo',sans-serif; }
  header{ padding:12px 16px; font-weight:700; border-bottom:1px solid var(--line); }
  .wrap{ padding:16px; max-width:560px; margin:0 auto; }
  .stage{ position:relative; width:100%; aspect-ratio:3/4; background:#000; border-radius:12px; overflow:hidden; }
  video,canvas{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  canvas{ touch-action:none; }
  .guide{ position:absolute; inset:8%; border:2px dashed rgba(255,255,255,.55); border-radius:8px; pointer-events:none; }
  .hint{ color:var(--sub); font-size:12px; margin:8px 2px; }
  .row{ display:flex; gap:8px; margin-top:12px; }
  button{ flex:1; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; }
  button.sub{ background:var(--panel); border:1px solid var(--line); color:var(--txt); }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:14px; }
  label{ display:block; color:var(--sub); font-size:12px; margin-bottom:4px; }
  input{ width:100%; padding:10px; border-radius:8px; border:1px solid var(--line); background:#0f1420; color:var(--txt); font-size:16px; }
  .big{ font-size:22px; font-weight:700; }
  a.link{ display:inline-block; margin-top:8px; color:#8fb3ff; }
  .muted{ color:var(--sub); font-size:12px; }
</style>
</head>
<body>
<header>📷 AgiS カード検品（MVP v0）</header>
<div class="wrap">

  <div class="stage" id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas" hidden></canvas>
    <div class="guide" id="guide"></div>
  </div>
  <div class="hint" id="hint">カードを枠に合わせて撮影。撮影後、内側の枠（絵柄の縁）の四隅を順にタップ → 上下左右の余白比が出る。</div>

  <div class="row">
    <button id="shot">撮影</button>
    <button id="retry" class="sub" hidden>撮り直す</button>
  </div>

  <div class="card" id="centerBox" hidden>
    <div class="muted">センタリング（目安・判定は自分の目で）</div>
    <div class="big" id="centerResult">四隅をタップしてください（残り <span id="left">4</span>）</div>
  </div>

  <div class="card">
    <label>型式（例: M2 110/080 ／ 289/SV-P）</label>
    <input id="ptype" placeholder="型式を入力（後でOCR自動化）">
    <div class="row">
      <button id="openGR">GRで相場を見る</button>
    </div>
    <a class="link" id="grLink" target="_blank" rel="noopener" hidden></a>
    <div class="muted" style="margin-top:6px">相場はGR算定値。最終値付けはスニダン現物で。</div>
  </div>

</div>

<script>
(function(){
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  const guide=document.getElementById('guide');
  const shot=document.getElementById('shot');
  const retry=document.getElementById('retry');
  const hint=document.getElementById('hint');
  const centerBox=document.getElementById('centerBox');
  const centerResult=document.getElementById('centerResult');
  const leftSpan=document.getElementById('left');
  const ptype=document.getElementById('ptype');
  const openGR=document.getElementById('openGR');
  const grLink=document.getElementById('grLink');
  let stream=null, taps=[];

  async function startCam(){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      video.srcObject=stream; await video.play();
      video.hidden=false; canvas.hidden=true; guide.hidden=false;
    }catch(e){
      hint.textContent='カメラを起動できない（HTTPSで開く必要あり）。型式入力＋GRリンクは使えます。';
    }
  }

  function capture(){
    const w=video.videoWidth||720, h=video.videoHeight||960;
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(video,0,0,w,h);
    video.hidden=true; canvas.hidden=false; guide.hidden=true;
    shot.hidden=true; retry.hidden=false;
    centerBox.hidden=false; taps=[]; leftSpan.textContent='4';
    centerResult.textContent='内側の四隅をタップ（左上→右上→右下→左下・残り 4）';
  }

  function resetShot(){
    video.hidden=false; canvas.hidden=true; guide.hidden=false;
    shot.hidden=false; retry.hidden=true; centerBox.hidden=true; taps=[];
  }

  canvas.addEventListener('pointerdown', function(ev){
    if(canvas.hidden) return;
    const r=canvas.getBoundingClientRect();
    const x=(ev.clientX-r.left)/r.width*canvas.width;
    const y=(ev.clientY-r.top)/r.height*canvas.height;
    taps.push({x,y});
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#4a7dff'; ctx.beginPath(); ctx.arc(x,y,8,0,7); ctx.fill();
    const rem=4-taps.length;
    if(rem>0){ leftSpan.textContent=rem; centerResult.textContent='タップ継続（残り '+rem+'）'; return; }
    computeCentering();
  });

  function computeCentering(){
    // taps: 0=左上,1=右上,2=右下,3=左下（内枠）。canvas端=カード外枠と近似
    const xs=taps.map(t=>t.x), ys=taps.map(t=>t.y);
    const innerL=Math.min(xs), innerR=canvas.width-Math.max(xs);
    const innerT=Math.min(ys), innerB=canvas.height-Math.max(ys);
    const lr=Math.round(innerL/(innerL+innerR)*100);
    const tb=Math.round(innerT/(innerT+innerB)*100);
    centerResult.innerHTML='左右 <b>'+lr+':'+(100-lr)+'</b> ／ 上下 <b>'+tb+':'+(100-tb)+'</b><br><span class="muted">50:50に近いほど良い。PSA10狙いの目安は概ね55:45以内。</span>';
  }

  function slug(t){
    return t.trim().toLowerCase().replace(/[\s/]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  }
  function updateGR(){
    const s=slug(ptype.value);
    if(!s){ grLink.hidden=true; return; }
    const url='https://grading.pokeca-chart.com/'+s+'/';
    grLink.href=url; grLink.textContent=url; grLink.hidden=false;
  }
  openGR.addEventListener('click', function(){
    const s=slug(ptype.value);
    if(!s){ ptype.focus(); return; }
    window.open('https://grading.pokeca-chart.com/'+s+'/','_blank','noopener');
  });
  ptype.addEventListener('input', updateGR);

  shot.addEventListener('click', capture);
  retry.addEventListener('click', resetShot);
  startCam();
})();
</script>
</body>
</html>
