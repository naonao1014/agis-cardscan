<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AgiS カード検品</title>
<style>
  :root{ --bg:#0f1420; --panel:#1a2130; --line:#2a3346; --txt:#e6e9ef; --sub:#8b93a7; --accent:#4a7dff; --good:#4ade80; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--txt); font-family:'Segoe UI','Meiryo',sans-serif; }
  header{ padding:12px 16px; font-weight:700; border-bottom:1px solid var(--line); }
  .wrap{ padding:16px; max-width:560px; margin:0 auto; }
  .stage{ position:relative; width:100%; aspect-ratio:3/4; background:#000; border-radius:12px; overflow:hidden; }
  video,canvas{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  canvas{ touch-action:none; }
  .guide{ position:absolute; inset:8%; border:2px dashed rgba(255,255,255,.55); border-radius:8px; pointer-events:none; }
  .hint{ color:var(--sub); font-size:12px; margin:8px 2px; }
  .row{ display:flex; gap:8px; margin-top:12px; }
  button{ flex:1; padding:12px; border:0; border-radius:10px; background:var(--accent); color:#fff; font-size:15px; font-weight:600; }
  button.sub{ background:var(--panel); border:1px solid var(--line); color:var(--txt); }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-top:14px; }
  label{ display:block; color:var(--sub); font-size:12px; margin-bottom:4px; }
  input{ width:100%; padding:10px; border-radius:8px; border:1px solid var(--line); background:#0f1420; color:var(--txt); font-size:16px; }
  .big{ font-size:22px; font-weight:700; }
  .price{ font-size:20px; font-weight:700; }
  .muted{ color:var(--sub); font-size:12px; }
  .name{ font-size:15px; font-weight:600; margin-bottom:6px; }
</style>
</head>
<body>
<header>📷 AgiS カード検品（MVP v0）</header>
<div class="wrap">

  <div class="stage" id="stage">
    <video id="video" playsinline muted></video>
    <canvas id="canvas" hidden></canvas>
    <div class="guide" id="guide"></div>
  </div>
  <div class="hint" id="hint">カードを枠に合わせて撮影。撮影後、内側の枠（絵柄の縁）の四隅を順にタップ → 上下左右の余白比が出る。</div>

  <div class="row">
    <button id="shot">撮影</button>
    <button id="retry" class="sub" hidden>撮り直す</button>
  </div>

  <div class="card" id="centerBox" hidden>
    <div class="muted">センタリング（目安・判定は自分の目で）</div>
    <div class="big" id="centerResult">内側の四隅をタップ（左上→右上→右下→左下）</div>
  </div>

  <div class="card">
    <label>型式（例: M2a 223/193 ／ 289/SV-P）</label>
    <input id="ptype" placeholder="型式を入力（後でOCR自動化）">
    <div id="priceOut" class="muted" style="margin-top:10px">型式を入れると相場が出る</div>
  </div>

</div>

<script>
(function(){
  const video=document.getElementById('video');
  const canvas=document.getElementById('canvas');
  const guide=document.getElementById('guide');
  const shot=document.getElementById('shot');
  const retry=document.getElementById('retry');
  const hint=document.getElementById('hint');
  const centerBox=document.getElementById('centerBox');
  const centerResult=document.getElementById('centerResult');
  const ptype=document.getElementById('ptype');
  const priceOut=document.getElementById('priceOut');
  let stream=null, taps=[], PRICES={};

  fetch('prices.json?'+Date.now()).then(r=>r.json()).then(d=>{PRICES=d.cards||{};}).catch(()=>{});

  async function startCam(){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
      video.srcObject=stream; await video.play();
      video.hidden=false; canvas.hidden=true; guide.hidden=false;
    }catch(e){ hint.textContent='カメラを起動できない。型式入力→相場は使えます。'; }
  }

  function capture(){
    const w=video.videoWidth||720, h=video.videoHeight||960;
    canvas.width=w; canvas.height=h;
    canvas.getContext('2d').drawImage(video,0,0,w,h);
    video.hidden=true; canvas.hidden=false; guide.hidden=true;
    shot.hidden=true; retry.hidden=false;
    centerBox.hidden=false; taps=[];
    centerResult.textContent='内側の四隅をタップ（残り 4）';
  }
  function resetShot(){
    video.hidden=false; canvas.hidden=true; guide.hidden=false;
    shot.hidden=false; retry.hidden=true; centerBox.hidden=true; taps=[];
  }

  canvas.addEventListener('pointerdown', function(ev){
    if(canvas.hidden) return;
    const r=canvas.getBoundingClientRect();
    const x=(ev.clientX-r.left)/r.width*canvas.width;
    const y=(ev.clientY-r.top)/r.height*canvas.height;
    taps.push({x:x,y:y});
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='#4a7dff'; ctx.beginPath(); ctx.arc(x,y,10,0,7); ctx.fill();
    const rem=4-taps.length;
    if(rem>0){ centerResult.textContent='内側の四隅をタップ（残り '+rem+'）'; return; }
    computeCentering();
  });

  function computeCentering(){
    const xs=taps.map(t=>t.x), ys=taps.map(t=>t.y);
    const innerL=Math.min.apply(null,xs), innerR=canvas.width-Math.max.apply(null,xs);
    const innerT=Math.min.apply(null,ys), innerB=canvas.height-Math.max.apply(null,ys);
    if(!(innerL+innerR>0)||!(innerT+innerB>0)){ centerResult.textContent='うまく取れなかった。撮り直してタップし直して。'; return; }
    const lr=Math.round(innerL/(innerL+innerR)*100);
    const tb=Math.round(innerT/(innerT+innerB)*100);
    centerResult.innerHTML='左右 <b>'+lr+':'+(100-lr)+'</b> ／ 上下 <b>'+tb+':'+(100-tb)+'</b><br><span class="muted">50:50に近いほど良い。PSA10狙いの目安は概ね55:45以内。判定は自分の目で。</span>';
  }

  function slug(t){
    var s=String(t).trim().toLowerCase().replace(/[\s/]+/g,'-');
    return s.replace(/-+/g,'-').replace(/^-|-$/g,'');
  }
  function yen(v){ return (typeof v==='number') ? '¥'+v.toLocaleString() : '—'; }
  function lookup(){
    const k=slug(ptype.value);
    if(!k){ priceOut.className='muted'; priceOut.textContent='型式を入れると相場が出る'; return; }
    const c=PRICES[k];
    if(!c){ priceOut.className='muted'; priceOut.innerHTML='「'+k+'」は未収録。<br>スニダン現物で確認を。'; return; }
    priceOut.className='';
    priceOut.innerHTML='<div class="name">'+(c.name||'')+'</div>'+
      '<div class="price">PSA10 '+yen(c.psa10)+' ／ 素体 '+yen(c.sotai)+'</div>'+
      '<div class="muted" style="margin-top:6px">出典 '+(c.src||'')+'（算定値）。最終値付けはスニダン現物で。</div>';
  }
  ptype.addEventListener('input', lookup);

  shot.addEventListener('click', capture);
  retry.addEventListener('click', resetShot);
  startCam();
})();
</script>
</body>
</html>
